services:
  db:
     image: postgres:18.3
     restart: always
     ports:
       - 5432:5432
     environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: password
       POSTGRES_DB: notes_db
     volumes:
       - pgdata:/var/lib/postgresql/18/docker

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  pgdata:
